<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatermelonDB Persistence Test</title>
    <script src="https://unpkg.com/@nozbe/watermelondb@0.27.1/dist/watermelondb.js"></script>
    <script src="https://unpkg.com/@nozbe/watermelondb@0.27.1/adapters/lokijs/dist/lokijs.js"></script>
</head>
<body>
    <h1>WatermelonDB Persistence Test</h1>
    <div id="status">Initializing...</div>
    <button onclick="createTestData()">Create Test Data</button>
    <button onclick="checkData()">Check Data</button>
    <button onclick="clearData()">Clear Data</button>
    <div id="results"></div>

    <script>
        const { Database, Model, field, text, readonly, date } = WatermelonDB;
        const LokiJSAdapter = WatermelonDBLokiJSAdapter.default;

        // Define a simple model
        class TestItem extends Model {
            static table = 'test_items';
            
            static associations = {};
        }

        // Add decorators manually since we can't use decorators in plain HTML
        TestItem.prototype.name = '';
        TestItem.prototype.value = '';
        TestItem.prototype.createdAt = null;

        // Define schema
        const schema = {
            version: 1,
            tables: [
                {
                    name: 'test_items',
                    columns: [
                        { name: 'name', type: 'string' },
                        { name: 'value', type: 'string' },
                        { name: 'created_at', type: 'number' },
                    ]
                }
            ]
        };

        // Create adapter with persistence settings
        const adapter = new LokiJSAdapter({
            schema,
            useWebWorker: false,
            useIncrementalIndexedDB: true,
            dbName: 'persistence_test_db',
            
            extraIncrementalIDBOptions: {
                autosave: true,
                autosaveInterval: 1000,
                throttledSaves: false,
                
                onDidOverwrite: () => {
                    console.log('🍉 Database was overwritten by another tab');
                },
                
                onversionchange: () => {
                    console.log('🍉 Database was deleted in another tab');
                },
            },
        });

        // Create database
        const database = new Database({
            adapter,
            modelClasses: [TestItem],
        });

        // Add debugging
        const originalWrite = database.write.bind(database);
        database.write = async (action) => {
            console.log('🍉 Database write operation starting...');
            const result = await originalWrite(action);
            console.log('🍉 Database write operation completed, data should be persisted');
            return result;
        };

        document.getElementById('status').textContent = 'Database initialized';

        async function createTestData() {
            try {
                console.log('Creating test data...');
                
                await database.write(async () => {
                    await database.get('test_items').create(item => {
                        item._raw.name = 'Test Item ' + Date.now();
                        item._raw.value = 'Test Value ' + Math.random();
                        item._raw.created_at = Date.now();
                    });
                });
                
                console.log('Test data created successfully');
                document.getElementById('status').textContent = 'Test data created';
                
                // Wait for autosave
                setTimeout(() => {
                    document.getElementById('status').textContent = 'Test data created and should be saved';
                }, 2000);
                
            } catch (error) {
                console.error('Failed to create test data:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        async function checkData() {
            try {
                console.log('Checking data...');
                
                const items = await database.get('test_items').query().fetch();
                
                console.log('Found items:', items.length);
                
                const results = items.map(item => ({
                    id: item.id,
                    name: item._raw.name,
                    value: item._raw.value,
                    created_at: new Date(item._raw.created_at).toLocaleString()
                }));
                
                document.getElementById('results').innerHTML = 
                    '<h3>Found ' + items.length + ' items:</h3>' +
                    '<pre>' + JSON.stringify(results, null, 2) + '</pre>';
                
                document.getElementById('status').textContent = 'Found ' + items.length + ' items';
                
            } catch (error) {
                console.error('Failed to check data:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        async function clearData() {
            try {
                console.log('Clearing data...');
                
                await database.write(async () => {
                    const items = await database.get('test_items').query().fetch();
                    for (const item of items) {
                        await item.destroyPermanently();
                    }
                });
                
                console.log('Data cleared successfully');
                document.getElementById('status').textContent = 'Data cleared';
                document.getElementById('results').innerHTML = '';
                
            } catch (error) {
                console.error('Failed to clear data:', error);
                document.getElementById('status').textContent = 'Error: ' + error.message;
            }
        }

        // Auto-check data on load
        setTimeout(checkData, 1000);
    </script>
</body>
</html>
