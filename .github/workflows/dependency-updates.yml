name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering

jobs:
  # Update Composer dependencies
  update-composer:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, fileinfo, mysql, gd, zip, bcmath

    - name: Install Composer dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Update Composer dependencies
      run: composer update --no-interaction --prefer-dist

    - name: Check for changes
      id: composer-changes
      run: |
        if git diff --quiet composer.lock; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Create Pull Request for Composer updates
      if: steps.composer-changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Composer dependencies'
        title: 'chore: Update Composer dependencies'
        body: |
          This PR updates Composer dependencies to their latest versions.
          
          ## Changes
          - Updated PHP dependencies as per composer.lock
          
          ## Testing
          - [ ] All tests pass
          - [ ] Application functionality verified
          - [ ] No breaking changes introduced
          
          Auto-generated by GitHub Actions.
        branch: chore/update-composer-dependencies
        delete-branch: true
        labels: |
          dependencies
          composer
          automated

  # Update npm dependencies
  update-npm:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Update npm dependencies
      run: npm update

    - name: Check for changes
      id: npm-changes
      run: |
        if git diff --quiet package-lock.json; then
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Run tests after update
      if: steps.npm-changes.outputs.changes == 'true'
      run: |
        npm run lint
        npm run type-check || true
        npm test || true

    - name: Create Pull Request for npm updates
      if: steps.npm-changes.outputs.changes == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update npm dependencies'
        title: 'chore: Update npm dependencies'
        body: |
          This PR updates npm dependencies to their latest versions.
          
          ## Changes
          - Updated JavaScript/TypeScript dependencies as per package-lock.json
          
          ## Testing
          - [ ] All tests pass
          - [ ] Build process works correctly
          - [ ] No breaking changes introduced
          - [ ] TypeScript compilation successful
          
          Auto-generated by GitHub Actions.
        branch: chore/update-npm-dependencies
        delete-branch: true
        labels: |
          dependencies
          npm
          automated

  # Security audit
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        composer install --no-interaction --prefer-dist
        npm ci

    - name: Run Composer security audit
      run: composer audit --format=json > composer-audit.json || true

    - name: Run npm security audit
      run: npm audit --json > npm-audit.json || true

    - name: Create security issue if vulnerabilities found
      run: |
        # Check if there are any vulnerabilities
        COMPOSER_VULNS=$(jq '.advisories | length' composer-audit.json 2>/dev/null || echo "0")
        NPM_VULNS=$(jq '.vulnerabilities | length' npm-audit.json 2>/dev/null || echo "0")
        
        if [ "$COMPOSER_VULNS" -gt 0 ] || [ "$NPM_VULNS" -gt 0 ]; then
          echo "Security vulnerabilities found!"
          echo "Composer vulnerabilities: $COMPOSER_VULNS"
          echo "npm vulnerabilities: $NPM_VULNS"
          
          # Create an issue (you might want to use a GitHub Action for this)
          echo "Would create security issue here"
        else
          echo "No security vulnerabilities found"
        fi

  # Check for outdated GitHub Actions
  update-actions:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update GitHub Actions
      uses: renovatebot/github-action@v39.2.3
      with:
        configurationFile: .github/renovate.json
        token: ${{ secrets.GITHUB_TOKEN }}

  # Clean up old workflow runs
  cleanup-runs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 10
